name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
    branches:
      - main
    paths:
      - 'Cargo.toml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.0)'
        required: true
        default: ''

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 独立的 tag 创建 job ─────────────────────────────────────────
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag_name: ${{ steps.version.outputs.TAG_NAME }}
      is_tag_push: ${{ steps.version.outputs.IS_TAG_PUSH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=v${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "IS_TAG_PUSH=false" >> $GITHUB_OUTPUT

          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${TAG}" >> $GITHUB_OUTPUT
            echo "IS_TAG_PUSH=true" >> $GITHUB_OUTPUT

          else
            VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "VERSION=${VER}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=v${VER}" >> $GITHUB_OUTPUT
            echo "IS_TAG_PUSH=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-create release tag
        if: steps.version.outputs.IS_TAG_PUSH == 'false' && github.event_name != 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ steps.version.outputs.TAG_NAME }}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally — skipping."
            exit 0
          fi

          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists on remote — skipping."
            exit 0
          fi

          git tag -a "${TAG}" -m "release: ${TAG}"
          git push origin "${TAG}"
          echo "Created and pushed tag: ${TAG}"

  # ── 构建 job，依赖 prepare ─────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.version != ''
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version consistency (tag-trigger only)
        if: needs.prepare.outputs.is_tag_push == 'true'
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ needs.prepare.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build
        run: cross build --target ${{ matrix.target }} --release

      - name: Package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BIN_NAME="anyst"
          # 压缩包内目录名使用纯版本号，如：0.2.1/
          RELEASE_DIR="v${VERSION}"
          mkdir -p "${RELEASE_DIR}"

          # 复制二进制文件
          cp target/${{ matrix.target }}/release/${BIN_NAME} "${RELEASE_DIR}/"

          # 复制配置文件（如果存在）
          [ -f "config.example.yaml" ] && cp config.example.yaml "${RELEASE_DIR}/" || true
          [ -f "anyst.service" ] && cp anyst.service "${RELEASE_DIR}/" || true

          # 压缩包文件名：anyst-x86_64-unknown-linux-gnu-v0.2.1.tar.gz
          PKG_FILE="${BIN_NAME}-${{ matrix.target }}-v${VERSION}.tar.gz"
          tar -czvf "${PKG_FILE}" "${RELEASE_DIR}"
          echo "PKG_FILE=${PKG_FILE}" >> $GITHUB_ENV
          echo "PKG_PATH=${PKG_FILE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyst-${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: ${{ env.PKG_PATH }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.TAG_NAME }}
          files: ${{ env.PKG_PATH }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
