name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # v0.1.0, v1.2.3, v0.1.0-alpha, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.1.0)'
        required: true
        default: ''

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Determine version ──────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: use the provided version string.
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Tag trigger: strip the leading 'v'.
            TAG="${{ github.ref_name }}"
            echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${TAG}" >> $GITHUB_OUTPUT
          fi

      # ── Verify Cargo.toml version matches the tag (tag‑trigger only) ─
      - name: Verify version consistency
        if: github.event_name != 'workflow_dispatch'
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build
        run: cross build --target ${{ matrix.target }} --release

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BIN_NAME="anyst"
          RELEASE_DIR="${BIN_NAME}-${VERSION}-${{ matrix.target }}"
          mkdir -p "${RELEASE_DIR}"

          # Binary
          cp target/${{ matrix.target }}/release/${BIN_NAME} "${RELEASE_DIR}/"

          # Supporting files
          cp config.example.yaml "${RELEASE_DIR}/"
          cp anyst.service          "${RELEASE_DIR}/"

          PKG_FILE="${RELEASE_DIR}.tar.gz"
          tar -czvf "${PKG_FILE}" "${RELEASE_DIR}"
          echo "PKG_FILE=${PKG_FILE}" >> $GITHUB_ENV
          echo "PKG_PATH=${PKG_FILE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyst-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}
          path: ${{ env.PKG_PATH }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          files: ${{ env.PKG_PATH }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
